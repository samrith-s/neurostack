<text clip-path="url(#cptiered0)" x="20" y="58" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#98c379" font-weight="bold">❯ </tspan><tspan fill="#abb2bf" font-weight="normal">neurostack </tspan><tspan fill="#e5c07b" font-weight="bold">tiered </tspan><tspan fill="#56b6c2" font-weight="normal">&quot;how does sleep help memory&quot; --top-k 3</tspan></text><text x="20" y="58" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" fill="#98c379" opacity="0">▋<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0.00000;0.00000;0.06855;0.06865;1" dur="33846ms" repeatCount="indefinite"/><animate attributeName="x" values="20;20;472.4;472.4;20" keyTimes="0.00000;0.00000;0.06855;0.06865;1" calcMode="linear" dur="33846ms" repeatCount="indefinite"/></text><text clip-path="url(#cptiered2)" x="20" y="102" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">Depth: </tspan><tspan fill="#56b6c2" font-weight="normal">auto</tspan><tspan fill="#5c6370" font-weight="normal">  →  triples+summaries (96% fewer tokens)</tspan></text><text clip-path="url(#cptiered4)" x="20" y="146" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">--- Triples (9) ---</tspan></text><text clip-path="url(#cptiered5)" x="20" y="168" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">  [</tspan><tspan fill="#98c379" font-weight="bold">0.763</tspan><tspan fill="#5c6370" font-weight="normal">] </tspan><tspan fill="#dcdfe4" font-weight="bold">REM sleep</tspan><tspan fill="#5c6370" font-weight="normal"> | consolidates emotional memories in | </tspan><tspan fill="#dcdfe4" font-weight="normal">consolidation</tspan></text><text clip-path="url(#cptiered6)" x="20" y="190" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">  [</tspan><tspan fill="#98c379" font-weight="bold">0.739</tspan><tspan fill="#5c6370" font-weight="normal">] </tspan><tspan fill="#dcdfe4" font-weight="bold">Spaced Repetition</tspan><tspan fill="#5c6370" font-weight="normal"> | maps to | </tspan><tspan fill="#dcdfe4" font-weight="normal">memory-consolidation during sleep</tspan></text><text clip-path="url(#cptiered7)" x="20" y="212" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">  [</tspan><tspan fill="#98c379" font-weight="bold">0.734</tspan><tspan fill="#5c6370" font-weight="normal">] </tspan><tspan fill="#dcdfe4" font-weight="bold">Active Recall</tspan><tspan fill="#5c6370" font-weight="normal"> | prompts | </tspan><tspan fill="#dcdfe4" font-weight="normal">memory consolidation during sleep</tspan></text><text clip-path="url(#cptiered9)" x="20" y="256" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">--- Summaries (3) ---</tspan></text><text clip-path="url(#cptiered10)" x="20" y="278" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">  </tspan><tspan fill="#dcdfe4" font-weight="bold">Memory Consolidation</tspan><tspan fill="#5c6370" font-weight="normal">  research/memory-consolidation.md</tspan></text><text clip-path="url(#cptiered11)" x="20" y="300" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">    Memory consolidation transforms newly acquired memories into</tspan></text><text clip-path="url(#cptiered12)" x="20" y="322" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">    stable long-term representations primarily during sleep...</tspan></text><text clip-path="url(#cptiered14)" x="20" y="366" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">  </tspan><tspan fill="#dcdfe4" font-weight="bold">Spaced Repetition</tspan><tspan fill="#5c6370" font-weight="normal">  research/spaced-repetition.md</tspan></text><text clip-path="url(#cptiered15)" x="20" y="388" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">    Utilises the spacing effect to enhance memory retention by</tspan></text><text clip-path="url(#cptiered16)" x="20" y="410" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">    reviewing at progressively longer intervals...</tspan></text><text clip-path="url(#cptiered18)" x="20" y="454" font-family="'SF Mono',Monaco,Consolas,Menlo,monospace" font-size="13" dominant-baseline="auto"><tspan fill="#5c6370" font-weight="normal">Tokens saved: </tspan><tspan fill="#98c379" font-weight="bold">~1,450</tspan><tspan fill="#5c6370" font-weight="normal"> (vs. sending full note content)</tspan></text>
